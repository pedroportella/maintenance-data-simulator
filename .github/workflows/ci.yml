name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Foundation quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run contract tests
        run: node --test

      - name: Run quality guards
        run: node scripts/quality-guards.mjs all

      - name: Run scenario smoke
        run: node scripts/scenario-smoke.mjs

      - name: Build container image
        run: docker build -t maintenance-data-simulator:ci .

      - name: Run container smoke
        run: node scripts/container-smoke.mjs --image maintenance-data-simulator:ci
